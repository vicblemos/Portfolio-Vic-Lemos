    <!--
      'Larken' is a paid Adobe Fonts family and doesn't exist on Google Fonts, so it was
      silently failing to load and every body-text element was falling back to system-ui.
      Playfair Display (free, ~78% visually similar to Larken) is loaded here as a stand-in
      until the real Larken font files are added — see client/src/index.css @font-face block.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Parkinsans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
